<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green: #35D976;
    --ink: #F5F5F2;
    --ink-dim: #B9B9B4;
    --ink-faint: #7C7C77;
    --card: rgba(255,255,255,0.07);
    --card-strong: rgba(255,255,255,0.14);
    --line: rgba(255,255,255,0.10);
    --radius: 20px;
    --serif: 'Playfair Display', serif;
    --sans: 'Poppins', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; font-family:var(--sans); color:var(--ink);}
  body{
    background:#000;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:20px;
  }
  .phone{
    width:390px; height:844px; max-height:96vh;
    background: radial-gradient(120% 90% at 15% 0%, #1a1a1a 0%, #050505 45%), linear-gradient(160deg, #000 0%, #2b2b2b 100%);
    border-radius:36px; overflow:hidden; position:relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:36px 24px 24px; opacity:0; pointer-events:none; transform: translateX(16px);
    transition: opacity 0.28s ease, transform 0.28s ease;
  }
  .screen.active{ opacity:1; pointer-events:auto; transform: translateX(0); }

  /* Buttons & shared bits */
  .btn-primary{
    width:100%; background:var(--ink); color:#111; border:none; border-radius:999px;
    padding:16px; font-family:var(--sans); font-weight:600; font-size:15px; cursor:pointer;
  }
  .btn-primary:active{ transform: scale(0.98); }
  .profile-avatar{
    border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #4fe3b8, #2b8f9e);
    color:#06231d; font-family:var(--serif); font-weight:600;
    border: 2px solid rgba(255,255,255,0.18);
  }
  .avatar-circle{ width:52px; height:52px; font-size:19px; }
  .chat-avatar{ width:44px; height:44px; font-size:16px; }
  .mini-avatar.profile-avatar{ width:30px; height:30px; font-size:12px; border-width:1px; }

  /* ---------- Screen 1: Onboarding ---------- */
  #onboarding{ align-items:center; text-align:center; justify-content:flex-start; }
  .ob-title{ font-family:var(--serif); font-weight:600; font-size:26px; margin: 4px 0 0; }
  .robot-wrap{ flex:1; display:flex; align-items:center; justify-content:center; width:100%; }
  .ob-sub{ font-size:14px; font-weight:600; color:var(--ink); margin:0 0 16px; }

  /* ---------- Screen 2: Home ---------- */
  .home-header{ display:flex; align-items:flex-start; justify-content:space-between; }
  .home-title{ font-family:var(--serif); font-weight:600; font-size:26px; margin:0; }
  .home-sub{ font-size:13px; color:var(--ink-dim); margin:6px 0 0; font-weight:500; }

  .card-row{ display:flex; gap:12px; margin-top:24px; }
  .talk-card{
    flex: 1.2; border-radius:var(--radius); padding:20px 16px; text-align:center;
    background: radial-gradient(120% 100% at 50% 0%, #6a4a63 0%, #3c2a3f 55%, #1b1420 100%);
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .orb{
    width:76px; height:76px; border-radius:50%;
    background: conic-gradient(from 180deg, #2ee6c8, #9b6bff, #ff5fb0, #ffd166, #2ee6c8);
    box-shadow: 0 0 30px rgba(180,120,255,0.35);
    position: relative;
  }
  .orb::after{
    content:''; position:absolute; inset:14px; border-radius:50%;
    background: radial-gradient(circle at 40% 35%, #fff 0%, rgba(255,255,255,0.15) 40%, transparent 70%);
  }
  .talk-card p{ font-family:var(--serif); font-weight:600; font-size:15px; margin:0; }
  .talk-card button{ width:100%; padding:10px; font-size:13px; }

  .side-cards{ flex:1; display:flex; flex-direction:column; gap:12px; }
  .mini-card{
    flex:1; background:var(--card-strong); border-radius:var(--radius); padding:14px;
    display:flex; flex-direction:column; justify-content:space-between; cursor:pointer;
    border:1px solid var(--line);
  }
  .mini-card:active{ background: var(--card); }
  .mini-icon{
    width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .mini-card span{ font-family:var(--sans); font-weight:600; font-size:13px; line-height:1.3; }
  .mini-bottom{ display:flex; align-items:flex-end; justify-content:space-between; }
  .arrow{ font-size:15px; }

  .recent-title{ font-family:var(--serif); font-weight:600; font-size:17px; margin:26px 0 12px; }
  .recent-item{
    background: var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; font-size:13px; color:var(--ink-dim); cursor:pointer;
  }
  .recent-item:active{ background: var(--card-strong); }

  /* ---------- Screen 3: Chat ---------- */
  #chat{ padding: 20px 0 0; }
  .chat-header{ display:flex; align-items:center; gap:14px; padding: 0 20px 18px; }
  .back-btn{ background:none; border:none; color:var(--ink); font-size:22px; cursor:pointer; padding:0 4px 0 0; }
  .chat-title-wrap{ flex:1; }
  .chat-title{ font-weight:700; font-size:17px; margin:0; }
  .chat-status{ font-size:12px; color:var(--green); margin:3px 0 0; display:flex; align-items:center; gap:5px; font-weight:500; }
  .chat-status .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; }
  .thread{ flex:1; overflow-y:auto; padding: 6px 20px; display:flex; flex-direction:column; gap:14px; }
  .row{ display:flex; align-items:flex-end; gap:8px; }
  .row.user{ justify-content:flex-end; }
  .row.bot{ justify-content:flex-start; }
  .bubble{ max-width:74%; padding:12px 16px; border-radius:18px; font-size:14px; line-height:1.5; }
  .bubble.user{ background:#EDEDEA; color:#151515; border-bottom-right-radius:4px; }
  .bubble.bot{ background:#3A3A3A; color:var(--ink); border-bottom-left-radius:4px; }
  .bubble img{ max-width:100%; border-radius:12px; display:block; margin-bottom:6px; }

  .typing{ display:flex; gap:4px; padding:12px 16px; background:#3A3A3A; border-radius:18px; border-bottom-left-radius:4px; width:fit-content; }
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--ink-faint); display:inline-block; animation:blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:0.2s; }
  .typing span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.25;} 40%{opacity:1;} }

  .chat-inputbar{
    display:flex; align-items:center; gap:10px; padding:14px 20px 20px; flex-shrink:0;
  }
  .chat-inputbar input{
    flex:1; background: var(--card-strong); border:1px solid var(--line); border-radius:999px;
    padding:14px 18px; font-size:14px; font-family:var(--sans); color:var(--ink); outline:none;
  }
  .chat-inputbar input::placeholder{ color:var(--ink-faint); }
  .mic-btn{ background:none; border:none; color:var(--ink-dim); font-size:18px; margin-left:-46px; cursor:pointer; transition: color 0.2s; }
  .mic-btn.listening{ color:#FF5F5F; animation: pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.2); } }
  .send-btn{
    width:44px; height:44px; border-radius:50%; background:var(--green); border:none; color:#08240F;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .send-btn:disabled{ opacity:0.5; }
  .send-btn svg{ width:18px; height:18px; }

  ::-webkit-scrollbar{ width:0; }
</style>
</head>
<body>

<div class="phone">

  <!-- SCREEN 1: ONBOARDING -->
  <div class="screen active" id="onboarding">
    <p class="home-sub" style="opacity:0"> </p>
    <h1 class="ob-title">Personal AI&nbsp;Assistant</h1>
    <div class="robot-wrap">
      <svg width="220" height="300" viewBox="0 0 220 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7CF5E0"/>
            <stop offset="100%" stop-color="#0E8C79"/>
          </radialGradient>
          <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E4E6E8"/>
            <stop offset="50%" stop-color="#9AA1A6"/>
            <stop offset="100%" stop-color="#6E747A"/>
          </linearGradient>
        </defs>
        <line x1="110" y1="10" x2="110" y2="38" stroke="#8a8f93" stroke-width="3"/>
        <circle cx="110" cy="8" r="6" fill="url(#eyeGlow)"/>
        <rect x="55" y="38" width="110" height="90" rx="34" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <circle cx="88" cy="88" r="20" fill="#12181a"/>
        <circle cx="88" cy="88" r="14" fill="url(#eyeGlow)"/>
        <circle cx="132" cy="88" r="20" fill="#12181a"/>
        <circle cx="132" cy="88" r="14" fill="url(#eyeGlow)"/>
        <rect x="85" y="112" width="50" height="6" rx="3" fill="#5b6065"/>
        <rect x="45" y="140" width="130" height="100" rx="24" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <rect x="80" y="165" width="60" height="24" rx="6" fill="#20272a"/>
        <circle cx="93" cy="177" r="4" fill="#E9B44C"/>
        <circle cx="110" cy="177" r="4" fill="#E9B44C"/>
        <circle cx="127" cy="177" r="4" fill="#E9B44C"/>
        <circle cx="110" cy="215" r="10" fill="#20272a"/>
        <rect x="18" y="150" width="26" height="70" rx="13" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <rect x="176" y="150" width="26" height="70" rx="13" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <circle cx="31" cy="228" r="13" fill="#7CE0D3"/>
        <circle cx="189" cy="228" r="13" fill="#7CE0D3"/>
        <rect x="65" y="235" width="34" height="46" rx="12" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <rect x="121" y="235" width="34" height="46" rx="12" fill="url(#metal)" stroke="#5b6065" stroke-width="2"/>
        <ellipse cx="82" cy="285" rx="24" ry="10" fill="#3d3f42"/>
        <ellipse cx="138" cy="285" rx="24" ry="10" fill="#3d3f42"/>
      </svg>
    </div>
    <p class="ob-sub">Nice to meet you! How can I help you</p>
    <button class="btn-primary" onclick="go('home')">Lets start chatting</button>
  </div>

  <!-- SCREEN 2: HOME -->
  <div class="screen" id="home">
    <div class="home-header">
      <div>
        <h1 class="home-title">Hey <span id="userName">Abdul</span></h1>
        <p class="home-sub">Let see what can I do for you?</p>
      </div>
      <div class="avatar-circle profile-avatar" id="homeAvatar">A</div>
    </div>

    <div class="card-row">
      <div class="talk-card">
        <div class="orb"></div>
        <p>Talk with me</p>
        <button class="btn-primary" onclick="startVoiceChat()">Lets talk</button>
      </div>
      <div class="side-cards">
        <div class="mini-card" onclick="go('chat')">
          <div class="mini-icon">&#128172;</div>
          <div class="mini-bottom">
            <span>Start<br>new chat</span>
            <span class="arrow">&rarr;</span>
          </div>
        </div>
        <div class="mini-card" onclick="document.getElementById('imageInput').click()">
          <div class="mini-icon">&#128247;</div>
          <div class="mini-bottom">
            <span>Search<br>by image</span>
            <span class="arrow">&rarr;</span>
          </div>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)" />
      </div>
    </div>

    <p class="recent-title">Recent searches</p>
    <div id="recentList">
      <p style="color:var(--ink-faint); font-size:13px;">Your recent questions will show up here.</p>
    </div>
  </div>

  <!-- SCREEN 3: CHAT -->
  <div class="screen" id="chat">
    <div class="chat-header">
      <button class="back-btn" onclick="go('home')">&#8249;</button>
      <div class="chat-title-wrap">
        <p class="chat-title">AI Assistant</p>
        <p class="chat-status"><span class="dot"></span>Online</p>
      </div>
      <div class="chat-avatar profile-avatar" id="chatAvatar">A</div>
    </div>

    <div class="thread" id="thread"></div>

    <div class="chat-inputbar">
      <input id="inputEl" type="text" placeholder="Ask me something..." autocomplete="off" />
      <button class="mic-btn" id="micBtn" aria-label="Voice input" onclick="toggleVoice()">&#127908;</button>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

</div>

<script>
/* ---------- Navigation ---------- */
function go(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'chat' && thread.children.length === 0){
    bootstrapChat();
  }
}

function startVoiceChat(){
  go('chat');
  setTimeout(() => toggleVoice(), 400);
}

/* ---------- Chat logic ---------- */
const thread = document.getElementById('thread');
const inputEl = document.getElementById('inputEl');
const sendBtn = document.getElementById('sendBtn');

const SYSTEM_PROMPT = `You are a warm, concise personal AI assistant embedded in a mobile chat app.
Keep replies short (1-3 sentences), conversational and friendly.
Never use markdown, asterisks, or headers - plain text only, this renders in a plain chat bubble.`;

let history = [];

function scrollToBottom(){ thread.scrollTop = thread.scrollHeight; }

function addRow(role, text, imageDataUrl){
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const imgHtml = imageDataUrl ? `<img src="${imageDataUrl}" alt="Uploaded image" />` : '';
  const bubble = `<div class="bubble ${role}">${imgHtml}${text}</div>`;
  const avatar = '<div class="mini-avatar profile-avatar">A</div>';
  row.innerHTML = role === 'bot' ? avatar + bubble : bubble;
  thread.appendChild(row);
  scrollToBottom();
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';
  row.innerHTML = '<div class="mini-avatar profile-avatar">A</div><div class="typing"><span></span><span></span><span></span></div>';
  thread.appendChild(row);
  scrollToBottom();
}
function removeTyping(){
  const el = document.getElementById('typingRow');
  if(el) el.remove();
}

async function callClaude(content){
  history.push({ role: 'user', content: content });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 800,
      system: SYSTEM_PROMPT,
      messages: history
    })
  });
  const data = await res.json();
  const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
  const reply = textBlocks.join('\n').trim() || "Sorry, I didn't catch that - try again?";
  history.push({ role: 'assistant', content: reply });
  return reply;
}

let lastInputWasVoice = false;

async function sendMessage(text){
  const val = (text !== undefined ? text : inputEl.value).trim();
  if(!val) return;
  addRow('user', val);
  inputEl.value = '';
  sendBtn.disabled = true;
  addRecentSearch(val);
  showTyping();
  try{
    const reply = await callClaude(val);
    removeTyping();
    addRow('bot', reply);
    if(lastInputWasVoice) speak(reply);
  }catch(err){
    removeTyping();
    addRow('bot', "I couldn't reach the server just now. Please try again.");
    console.error(err);
  }
  lastInputWasVoice = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function startChatWith(text){
  go('chat');
  if(thread.children.length === 0) bootstrapChat();
  setTimeout(() => sendMessage(text), 250);
}

function bootstrapChat(){
  addRow('bot', 'Hii welcome, how can I help you?');
}

/* ---------- Recent searches (updates immediately, this session) ---------- */
let recentSearches = [];
const recentList = document.getElementById('recentList');

function addRecentSearch(text){
  recentSearches = recentSearches.filter(t => t !== text);
  recentSearches.unshift(text);
  recentSearches = recentSearches.slice(0, 5);
  renderRecentSearches();
}

function renderRecentSearches(){
  if(recentSearches.length === 0){
    recentList.innerHTML = '<p style="color:var(--ink-faint); font-size:13px;">Your recent questions will show up here.</p>';
    return;
  }
  recentList.innerHTML = recentSearches.map(t =>
    `<div class="recent-item" onclick="startChatWith(${JSON.stringify(t)})">${t}</div>`
  ).join('');
}

/* ---------- Voice input (speech-to-text) ---------- */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let isListening = false;
const micBtn = document.getElementById('micBtn');

if(SpeechRecognitionAPI){
  recognizer = new SpeechRecognitionAPI();
  recognizer.lang = 'en-US';
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 1;

  recognizer.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    lastInputWasVoice = true;
    sendMessage(transcript);
  };
  recognizer.onend = () => { isListening = false; micBtn.classList.remove('listening'); };
  recognizer.onerror = () => { isListening = false; micBtn.classList.remove('listening'); };
}

function toggleVoice(){
  if(!SpeechRecognitionAPI){
    alert("Voice input isn't supported in this browser. Try Chrome on desktop or Android.");
    return;
  }
  if(isListening){
    recognizer.stop();
    isListening = false;
    micBtn.classList.remove('listening');
    return;
  }
  isListening = true;
  micBtn.classList.add('listening');
  recognizer.start();
}

/* ---------- Voice output (text-to-speech) ---------- */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.02;
  window.speechSynthesis.speak(utter);
}

/* ---------- Search by image ---------- */
function handleImageSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    const base64Data = dataUrl.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    sendImageMessage(dataUrl, base64Data, mediaType);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

async function sendImageMessage(dataUrl, base64Data, mediaType){
  go('chat');
  if(thread.children.length === 0) bootstrapChat();

  const caption = 'What can you tell me about this image?';
  addRow('user', caption, dataUrl);
  addRecentSearch('Image search');
  sendBtn.disabled = true;
  showTyping();

  const content = [
    { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } },
    { type: 'text', text: caption }
  ];

  try{
    const reply = await callClaude(content);
    removeTyping();
    addRow('bot', reply);
  }catch(err){
    removeTyping();
    addRow('bot', "I couldn't analyze that image just now. Please try again.");
    console.error(err);
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', () => sendMessage());
inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

</script>

</body>
</html>
